<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Strona produktu</title>
    <link href="product-page.css" rel="stylesheet">
</head>
<body>
<header>
    <div class="header-left">
        <h1>Produkt</h1>
        <button onclick="location.href='/index/index.html'">Powróć do sklepu</button>
    </div>
</header>
<main class="product-page">
    <div class="product-container">

        <div id="image-section">
        </div>

        <div class="info-section">
            <h1 id="product-name" class="display-name">Produkt</h1>

            <div class="price-tag">
                <span id="product-price" class="price-value">Cena: 0.00 zł</span>
            </div>

            <div class="meta-info">
                <p id="product-seller" class="seller-info">Sprzedawca: </p>
                <p id="product-stock" class="stock-info">Dostępna ilość: </p>
            </div>

            <hr class="divider"> <div class="product-description">
            <h3>Opis Produktu:</h3>
            <p id="product-description">Ładowanie opisu...</p>
        </div>

            <div class="action-section">
                <button class="cart-btn" onclick="addToCart()">Dodaj do koszyka</button>
                <button class="buy-btn" onclick="buyNow()">Kup i zapłać</button>
            </div>
        </div>

    </div>
    <script src="product-page.js"></script>
</main>
</body>
</html>
