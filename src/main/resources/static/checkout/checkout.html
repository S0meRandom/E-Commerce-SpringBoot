<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Podsumowanie zamówienia</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
<div class="checkout-container">
    <div class="checkout-form">
        <h2>Dane do wysyłki</h2>
        <form id="order-form">
            <div class="form-group">
                <label>Imię i Nazwisko</label>
                <input type="text" id="name" required placeholder="Imię i Nazwisko">
            </div>
            <div class="form-group">
                <label>Adres</label>
                <input type="text" id="address" required placeholder="Ulica i numer mieszkania/domu">
            </div>
            <div class="form-row">
                <input type="text" id="city" required placeholder="Miasto">
                <input type="text" id="zip" required placeholder="Kod pocztowy">
            </div>
            <div class="form-group">
                <label>Metoda płatności</label>
                <select id="payment-method">
                    <option value="CARD">Karta płatnicza</option>
                    <option value="BLIK">BLIK</option>
                    <option value="TRANSFER">Przelew bankowy</option>
                </select>
            </div>
            <button type="submit" class="submit-btn" onclick="createOrders(event)">Zamawiam i płacę</button>
        </form>
    </div>

    <div class="order-summary">
        <h2>Twoje zamówienie</h2>
        <div id="checkout-items">
        </div>
        <hr>
        <div class="summary-line">
            <span>Suma częściowa:</span>
            <span id="subtotal">0.00 zł</span>
        </div>
        <div class="summary-line">
            <span>Dostawa:</span>
            <span>15zł</span>
        </div>
        <div class="summary-line total">
            <span>Razem:</span>
            <span id="grand-total"></span>
        </div>
    </div>
</div>
<script src="checkout.js"></script>
</body>
</html>
