<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Sklep</title>
    <link href="index.css" rel="stylesheet">
</head>
<body>
<header>
    <div class="header-left">
        <div class="headerLeft-left">
            <h1>Sklep Internetowy</h1>
            <span>Koszyk: <strong id="cart-count">0</strong> przedmiotów</span>
        </div>
        <div class="headerLeft-right">
            <button onclick="addProduct()">Dodaj produkt do sklepu</button>
            <button onclick="accessCart()">Zobacz Koszyk</button>
            <input type="text" id="searchInput" placeholder="Wyszukaj produkty">
            <button id="search-btn"onclick="searchProducts()">Szukaj</button>
        </div>
    </div>
    <div class="header-right">
        <button id="prof-btn" onclick="accessProfile()">Profil Użytkownika</button>
        <button id="log-btn" onclick="location.href='/login/login.html'">Zaloguj Się</button>
    </div>
</header>
<div id="product-grid"></div>
<script src="index.js"></script>
</body>
</html>
