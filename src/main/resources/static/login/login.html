<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logowanie</title>
    <link href="login.css" rel="stylesheet">
</head>
<body>
<div class="login-container">
    <form id="login-form">
        <h2>Zaloguj się</h2> <p>Witaj z powrotem!</p>

        <div class="form-group">
            <label>Użytkownik</label>
            <input type="text" id="username" required>
        </div>
        <div class="form-group">
            <label>Hasło</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit" class="log-btn">Wejdź</button>

        <div class="footer">
            Nie masz konta? <a href="/register/register.html">Stwórz je!</a>
        </div>
    </form>
</div>
<script src="login.js"></script>

</body>
</html>
