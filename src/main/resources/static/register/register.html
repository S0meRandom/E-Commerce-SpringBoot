<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rejestracja</title>
    <link rel="stylesheet" href="register.css">

</head>
<body>
<div class="register-card">
    <h2>Tworzenie konta</h2>
    <p>Aby uzyskać dostęp do sklepu,stwórz konto</p>
    <div id="msg"></div>

    <form id="register-form">
        <div class="form-username">
            <label class="username">Nazwa użytkownika</label>
            <input type="text" id="username" placeholder="Wpisz login/Nazwe użytkownika" required>
        </div>
        <div class="form-email">
            <label class="email">Adres E-Mail</label>
            <input type="email" id="email" placeholder="Podaj adres E-Mail" required>
        </div>
        <div class="form-password">
            <label class="password">Hasło</label>
            <input type="password" id="password" placeholder="Wpisz hasło" required>
        </div>
        <button type="submit" class="btn-register">Zarejestruj się</button>
    </form>

    <div class="footer">
        Masz już konto?<a href="/login/login.html">Zaloguj się tutaj</a>
    </div>
</div>
<script src="register.js"></script>
</body>
</html>
