<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moje Oferty - Panel Sprzedawcy</title>
    <link rel="stylesheet" href="userOffers.css">
</head>
<body>
<nav class="navbar">
    <h1 onclick="location.href='/index/index.html'">Sklep Internetowy</h1>
    <div class="nav-links">
        <button onclick="location.href='/index/index.html'">Sklep</button>
        <button onclick="location.href='/userProfile/userProfile.html'">Profil</button>
        <button class="logout-btn" onclick="logout()">Wyloguj</button>
    </div>
</nav>

<main class="dashboard">
    <header class="dashboard-header">
        <div>
            <h1>Twoje Produkty</h1>
            <p>Zarządzaj swoimi aktywnymi ogłoszeniami</p>
        </div>
        <button class="add-btn" onclick="location.href='/add-product/add-product.html'">
            + Dodaj nowy produkt
        </button>
    </header>

    <section class="stats">
        <div class="stat-card">
            <span class="stat-label">Aktywne oferty</span>
            <span id="count-value" class="stat-number">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Łączna wartość</span>
            <span id="total-price" class="stat-number">0.00 zł</span>
        </div>
    </section>

    <div id="offers-container">

    </div>
</main>
<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="edit-form">
            <h2>Dane do edycji</h2>
            <form id="edit-form">
                <div class="form-group">
                    <label>Nazwa Produktu</label>
                    <input type="text" id="name" placeholder="Nowa Nazwa">
                </div>
                <div class="form-group">
                    <label>Cena</label>
                    <input type="number" id="price" placeholder="Nowa Cena">
                </div>
                <div class="form-row">
                    <input type="text" id="stock_quantity" placeholder="Nowa ilość w magazynie">
                    <textarea id="description" placeholder="Nowy opis produktu"></textarea>
                </div>
                <div class="form-group">
                    <button type="submit" class="submit-btn">Edytuj</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="/userProfile/userProfile.js"></script>
<script src="userOffers.js"></script>
</body>
</html>
